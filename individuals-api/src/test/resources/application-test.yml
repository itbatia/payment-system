# ==================================================================================================================== #
# BASE config                                                                                                          #
# ==================================================================================================================== #
server:
  port: 8082

logging:
  level:
    by.itbatia.psp.individualsapi.service.impl.TokenServiceImpl: INFO

# ==================================================================================================================== #
# APPLICATION config                                                                                                   #
# ==================================================================================================================== #
individuals-api:
  keycloak:
    realm: individuals
    base-url: mock
    client-id: individuals-api
    client-secret: test-secret
    connection-timeout: 5000
    admin-token-caching-time-in-sec: 290
  person-service-client:
    base-url: mock
    connection-timeout: 5000

# ==================================================================================================================== #
# METRICS config                                                                                                       #
# ==================================================================================================================== #
management:
  prometheus:
    metrics:
      export:
        enabled: false
