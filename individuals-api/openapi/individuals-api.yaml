openapi: 3.0.3
info:
  title: Individuals API
  description: REST API для регистрации, логина, обновления токена и получения информации о пользователе через Keycloak.
  version: 1.0.0

servers:
  - url: http://localhost:8082/api/v1
    description: Local development server

tags:
  - name: Authentication
    description: REST API for user registration and authentication

########################################################################################################################
###########################                             Auth Api                             ###########################
########################################################################################################################

paths:
  /auth/registration:
    post:
      operationId: registerUser
      summary: User registration
      description: |
        Registers a new user and returns authentication tokens.
        
        **Validation rules:**
        - Email must be in valid format
        - Password must meet security requirements
        - Password and confirmation must match exactly
      tags:
        - Authentication
      requestBody:
        $ref: '../../person-service/openapi/person-service-api.yaml#/components/requestBodies/IndividualCreateRequestBody'
      responses:
        '201':
          $ref: '#/components/responses/RegistrationResponse201'
        '400':
          $ref: '#/components/responses/Response400'
        '403':
          $ref: '#/components/responses/RegistrationResponse403'
        '409':
          $ref: '#/components/responses/RegistrationResponse409'

  /auth/login:
    post:
      operationId: login
      summary: User login
      description: |
        Authenticates user credentials and returns access/refresh tokens.

        **Important:**
        - No local database lookup — credentials are validated directly against Keycloak
        - Returns 401 if email/password combination is invalid
        - This endpoint is public (no authentication required)
      tags:
        - Authentication
      requestBody:
        $ref: '#/components/requestBodies/UserLoginRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/UserLoginResponse200'
        '400':
          $ref: '#/components/responses/Response400'
        '401':
          $ref: '#/components/responses/Response401'

  /auth/refresh-token:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token (and optionally a new refresh token).

        **Important:**
        - The provided refresh token must be valid and not expired
        - This endpoint is public (no authentication required)
        - Client credentials are handled internally by the service
      tags:
        - Authentication
      requestBody:
        $ref: '#/components/requestBodies/RefreshTokenRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/RefreshTokenResponse200'
        '400':
          $ref: '#/components/responses/RefreshTokenResponse400'
        '401':
          $ref: '#/components/responses/RefreshTokenResponse401'

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      description: |
        Retrieves detailed information about the currently authenticated user.

        **Authentication requirements:**
        - The request must include a valid `Authorization: Bearer <access_token>` header.
        - The access token must be issued by Keycloak for the same realm as the service.
        - The token must be active and not expired.

        **How it works:**
        1. The service validates the JWT access token using Spring Security and Keycloak's public keys.
        2. It extracts the user identifier (`sub` claim) from the token.
        3. It calls Keycloak Admin API (`GET /admin/realms/{realm}/users/{id}`) to fetch the full user profile.
        4. It maps Keycloak's `UserRepresentation` to a simplified `UserInfoResponse` DTO.

        **Security note:**
        This endpoint does **not** accept credentials (username/password). It only works with a valid OAuth2 access token.

        **Error scenarios:**
        - `401 Unauthorized`: Missing, invalid, or expired token.
        - `404 Not Found`: User exists in token but was deleted in Keycloak.
      tags:
        - Authentication
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          $ref: '#/components/responses/GetMeResponse200'
        '401':
          description: Unauthorized. Invalid, missing, or expired access token
        '404':
          $ref: '#/components/responses/UserResponse404'

########################################################################################################################
###########################                         Individuals Api                          ###########################
########################################################################################################################

  /individuals/me:
    put:
      operationId: update
      summary: Update individual
      description: |
        Updates an existing Individual's data (first name, last name, contact info, address, etc).

        **Validation rules:**
        - Only non-null fields are updated (partial updates supported)
        - Address and User fields can be updated independently
        - Country must still exist in reference table

        **Audit note:**
        All changes are automatically tracked by Hibernate Envers. Historical versions can be retrieved via separate audit endpoints (not part of this spec).

        **Error scenarios:**
        - `400 Bad Request`: Invalid field values
        - `404 Not Found`: Individual does not exist
      tags:
        - Individuals
      requestBody:
        $ref: '../../person-service/openapi/person-service-api.yaml#/components/requestBodies/IndividualUpdateRequestBody'
      responses:
        '200':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/SuccessfulIndividualResponse'
        '400':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/NotFound'

  /individuals/me/{id}:
    get:
      operationId: getById
      summary: Get individual by ID
      description: |
        Retrieves an individual by his UUID, including full user, address and country details.

        **Error scenarios:**
        - `404 Not Found`: No individual exists with the given ID
      tags:
        - Individuals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: "a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8"
      responses:
        '200':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/SuccessfulIndividualResponse'
        '404':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/NotFound'

    delete:
      operationId: delete
      summary: Delete individual
      description: |
        Soft-deletes a individual by marking related records as archived.
        Actual database rows are not removed (to preserve audit history).

        **Note:** This operation is irreversible from the API perspective.

        **Error scenarios:**
        - `404 Not Found`: Individual does not exist
      tags:
        - Individuals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: "a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8"
      responses:
        '204':
          description: Individual deleted (archived)
        '404':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/NotFound'

  /individuals/me/email/{email}:
    get:
      operationId: getByEmail
      summary: Get individual by email
      description: |
        Retrieves an individual by his user email.

        **Use case:** Used by `individuals-api` during registration to check for duplicates.

        **Error scenarios:**
        - `404 Not Found`: No individual with this user email
      tags:
        - Individuals
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
          example: "john.doe@example.com"
      responses:
        '200':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/SuccessfulIndividualResponse'
        '404':
          $ref: '../../person-service/openapi/person-service-api.yaml#/components/responses/NotFound'

########################################################################################################################
##########################               components: schemas: Create Requests                ###########################
########################################################################################################################

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    UserLoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenRefreshRequest:
      type: object
      required: [ refresh_token ]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          example: Bearer

    UserInfoResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

########################################################################################################################
############################                components: responses: Examples                 ############################
########################################################################################################################

  responses:

    RegistrationResponse201:
      description: Individual registered successfully. Returns tokens.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TokenResponse'
          examples:
            Successful Response:
              summary: Example of a response
              value:
                access_token: "eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ...<truncated>"
                refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
                expires_in: 300
                token_type: "Bearer"

    UserLoginResponse200:
      description: Authentication successful. Returns access and refresh tokens.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TokenResponse'
          examples:
            SuccessfulLoginResponse:
              summary: Tokens issued successfully
              value:
                access_token: "eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ...<truncated>"
                refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
                expires_in: 300
                token_type: "Bearer"

    Response400:
      description: Bad request. Validation failed (e.g., missing fields or invalid email format)
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            ErrorResponse:
              summary: Input validation failed
              value:
                error: "Password and confirmation don't match"
                status: 400

    Response401:
      description: Unauthorized. Invalid email or password
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            InvalidCredentials:
              summary: Authentication failed
              value:
                error: "Invalid user credentials"
                status: 401

    RegistrationResponse403:
      description: Forbidden. Server misconfiguration (contact admin).
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            ErrorResponse:
              summary: Example of a response
              value:
                error: "You don't have permission to access this resource."
                status: 403

    UserResponse404:
      description: Not Found. User referenced in token does not exist in Keycloak
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            UserNotFound:
              summary: User was deleted after token issuance
              value:
                error: "Authentication error: User not found"
                status: 404

    RegistrationResponse409:
      description: Conflict. User with this email already exists.
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            ErrorResponse:
              summary: Example of a response
              value:
                error: "User exists with same email"
                status: 409

    RefreshTokenResponse200:
      description: Access token successfully refreshed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TokenResponse'
          examples:
            SuccessfulRefreshResponse:
              summary: New tokens issued
              value:
                access_token: "eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ...<truncated>"
                refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
                expires_in: 300
                token_type: "Bearer"

    RefreshTokenResponse400:
      description: Bad request. Missing or invalid refresh token
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            MissingRefreshToken:
              summary: Validation error
              value:
                error: "RefreshToken field is required"
                status: 400

    RefreshTokenResponse401:
      description: Unauthorized. Invalid, expired, or revoked refresh token
      content:
        application/json:
          schema:
            $ref: '../../person-service/openapi/person-service-api.yaml#/components/schemas/ErrorResponse'
          examples:
            InvalidRefreshToken:
              summary: Token validation failed
              value:
                error: "Token is not active"
                status: 401

    GetMeResponse200:
      description: User profile retrieved successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserInfoResponse'
          examples:
            SuccessfulResponse:
              summary: Example of a valid user profile
              value:
                id: "a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8"
                email: "user@example.com"
                created_at: "2026-02-25T17:01:53.471Z"
                roles: [ ]

########################################################################################################################
###############################                components: requestBodies                 ###############################
########################################################################################################################

  requestBodies:

    UserLoginRequestBody:
      description: User login credentials
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserLoginRequest'
          examples:
            LoginRequestExample:
              summary: Valid login credentials
              value:
                email: "user@example.com"
                password: "SecurePass123!"

    RefreshTokenRequestBody:
      description: Refresh token request
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TokenRefreshRequest'
          examples:
            RefreshTokenExample:
              summary: Valid refresh token request
              value:
                refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
