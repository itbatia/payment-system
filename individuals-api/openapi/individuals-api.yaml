openapi: 3.0.3
info:
  title: Individuals API
  description: REST API для регистрации, логина, обновления токена и получения информации о пользователе через Keycloak.
  version: 1.0.0
servers:
  - url: http://localhost:8082/api/v1

paths:
  /auth/registration:
    post:
      operationId: registerUser
      summary: User registration
      description: |
        Registers a new user and returns authentication tokens.
        
        **Validation rules:**
        - Email must be in valid format
        - Password must meet security requirements
        - Password and confirmation must match exactly
      tags:
        - Authentication
      requestBody:
        description: User registration details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
            examples:
              exampleOfCreatingUser:
                summary: Example of creating a user
                description: |
                  **Field requirements:**
                  - `email`: valid email format (e.g., user@example.com)
                  - `password`: at least 8 characters, including uppercase, lowercase, and digits
                  - `confirm_password`: must exactly match `password`
                value:
                  email: "example@qmail.com"
                  password: "SecurePass123!"
                  confirm_password: "SecurePass123!"
      responses:
        '201':
          description: User created successfully. Returns tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                Successful Response:
                  summary: Example of a response
                  value:
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ...<truncated>"
                    refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
                    expires_in: 300
                    token_type: "Bearer"
        '400':
          description: Bad request. Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ErrorResponse:
                  summary: Example of a response
                  value:
                    error: "Password and confirmation don't match"
                    status: 400
        '403':
          description: Forbidden. Server misconfiguration (contact admin).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ErrorResponse:
                  summary: Example of a response
                  value:
                    error: "You don't have permission to access this resource."
                    status: 403
        '409':
          description: Conflict. User with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ErrorResponse:
                  summary: Example of a response
                  value:
                    error: "User exists with same email"
                    status: 409

  /auth/login:
    post:
      operationId: login
      summary: User login
      description: |
        Authenticates user credentials and returns access/refresh tokens.

        **Important:**
        - No local database lookup — credentials are validated directly against Keycloak
        - Returns 401 if email/password combination is invalid
        - This endpoint is public (no authentication required)
      tags:
        - Authentication
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
            examples:
              LoginRequestExample:
                summary: Valid login credentials
                value:
                  email: "user@example.com"
                  password: "SecurePass123!"
      responses:
        '200':
          description: Authentication successful. Returns access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                SuccessfulLoginResponse:
                  summary: Tokens issued successfully
                  value:
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ...<truncated>"
                    refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
                    expires_in: 300
                    token_type: "Bearer"
        '400':
          description: Bad request. Validation failed (e.g., missing fields or invalid email format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ValidationError:
                  summary: Input validation failed
                  value:
                    error: "Email must be a valid email address"
                    status: 400
        '401':
          description: Unauthorized. Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InvalidCredentials:
                  summary: Authentication failed
                  value:
                    error: "Invalid user credentials"
                    status: 401

  /auth/refresh-token:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token (and optionally a new refresh token).

        **Important:**
        - The provided refresh token must be valid and not expired
        - This endpoint is public (no authentication required)
        - Client credentials are handled internally by the service
      tags:
        - Authentication
      requestBody:
        description: Refresh token request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
            examples:
              RefreshTokenExample:
                summary: Valid refresh token request
                value:
                  refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
      responses:
        '200':
          description: Access token successfully refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              examples:
                SuccessfulRefreshResponse:
                  summary: New tokens issued
                  value:
                    access_token: "eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJ...<truncated>"
                    refresh_token: "eyJhbGciOiJIUzUxMiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICI...<truncated>"
                    expires_in: 300
                    token_type: "Bearer"
        '400':
          description: Bad request. Missing or invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                MissingRefreshToken:
                  summary: Validation error
                  value:
                    error: "RefreshToken field is required"
                    status: 400
        '401':
          description: Unauthorized. Invalid, expired, or revoked refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                InvalidRefreshToken:
                  summary: Token validation failed
                  value:
                    error: "Token is not active"
                    status: 401

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      description: |
        Retrieves detailed information about the currently authenticated user.

        **Authentication requirements:**
        - The request must include a valid `Authorization: Bearer <access_token>` header.
        - The access token must be issued by Keycloak for the same realm as the service.
        - The token must be active and not expired.

        **How it works:**
        1. The service validates the JWT access token using Spring Security and Keycloak's public keys.
        2. It extracts the user identifier (`sub` claim) from the token.
        3. It calls Keycloak Admin API (`GET /admin/realms/{realm}/users/{id}`) to fetch the full user profile.
        4. It maps Keycloak's `UserRepresentation` to a simplified `UserInfoResponse` DTO.

        **Security note:**
        This endpoint does **not** accept credentials (username/password). It only works with a valid OAuth2 access token.

        **Error scenarios:**
        - `401 Unauthorized`: Missing, invalid, or expired token.
        - `404 Not Found`: User exists in token but was deleted in Keycloak.
      tags:
        - Authentication
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
              examples:
                SuccessfulResponse:
                  summary: Example of a valid user profile
                  value:
                    id: "a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8"
                    email: "user@example.com"
                    created_at: "2026-02-25T17:01:53.471Z"
                    roles: [ ]
        '401':
          description: Unauthorized. Invalid, missing, or expired access token
        '404':
          description: Not Found. User referenced in token does not exist in Keycloak
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                UserNotFound:
                  summary: User was deleted after token issuance
                  value:
                    error: "Authentication error: User not found"
                    status: 404

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegistrationRequest:
      type: object
      required: [ email, password, confirm_password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        confirm_password:
          type: string

    UserLoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenRefreshRequest:
      type: object
      required: [ refresh_token ]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          example: Bearer

    UserInfoResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        status:
          type: integer