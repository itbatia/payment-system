services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: individuals-keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./individuals-api/resources/realm-config.json:/opt/keycloak/data/import/realm-config.json
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080"]              # Used TCP healthcheck because 'curl' not found
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-postgres:
    image: postgres:17
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  individuals-api:
    build:
      context: .
      dockerfile: individuals-api/Dockerfile
    container_name: individuals-api
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      LOG_LEVEL_TOKEN_SERVICE: DEBUG                      # DEBUG/INFO -> with/without: (log example) 'User with [username=test@mail.ru] has logged in'.
      KC_REALM: individuals                               # Name of the Keycloak realm used for authentication and user management.
      KC_BASE_URL: http://keycloak:8080                   # Base URL of the Keycloak server.
      KC_CLIENT_ID: individuals-api                       # Client ID registered in Keycloak for this service.
      KC_CLIENT_SECRET: 9nekCm9JrhldqeBx5bw00LIzIBRYve6l  # Secret associated with the Keycloak client. Must be hidden in production env.
      KC_CONNECTION_TIMEOUT: 5000                         # Timeout (in millis) for HTTP connections to the Keycloak server.
      KC_ADMIN_TOKEN_CACHING_TIME_IN_SEC: 290             # Admin token caching time. Must be less than the actual expires_in (expires_in = 300).
      EXPORT_METRICS_ENABLED: true                        # Enable/disable export metrics by Prometheus.
      PERSON_SERVICE_BASE_URL: http://person-service:8083 # Base URL of the Person service.
      PERSON_SERVICE_CONNECTION_TIMEOUT: 5000             # Timeout (in millis) for HTTP connections to the Person service.
    depends_on:
      keycloak:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-psp
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.5.12
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki                                                   # to save state between container restarts
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.3.5
    container_name: grafana-psp
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.5.12
    container_name: promtail
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/config.yml
#      - /var/run/docker.sock:/var/run/docker.sock                        # ← for Linux/macOS only
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:9080/metrics" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  loki_data: