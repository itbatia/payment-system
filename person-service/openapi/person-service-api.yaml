openapi: 3.0.3
info:
  title: Person Service API
  version: 1.0.0
  description: |
    Internal REST API for managing persons (users, individuals, addresses) in the payment-system.
    This service is **not public** — it is called exclusively by `individuals-api` orchestrator.
    All operations are transactional and support Hibernate Envers audit history.

servers:
  - url: http://localhost:8082/api/v1
    description: Local development server

tags:
  - name: Persons
    description: CRUD operations for persons (user + individual + address)

paths:
  /persons:
    post:
      operationId: createPerson
      summary: Create a new person
      description: |
        Creates a new person with associated user, individual, and address records in a single transaction.

        **Validation rules:**
        - Email must be in valid format and unique across the system
        - First and last names are required
        - Address must include country (ISO alpha2), city, zip code, and address line
        - Country must exist in the `countries` reference table

        **How it works:**
        1. The service validates input data.
        2. It inserts records into `users`, `addresses`, and `individuals` tables atomically.
        3. On success, returns full person profile including resolved country details.
        4. All created entities are assigned UUIDs (`id` fields).

        **Error scenarios:**
        - `400 Bad Request`: Missing or invalid fields (e.g., malformed email, missing address)
        - `409 Conflict`: User with this email already exists

        **Security note:**
        This endpoint is **internal only** and should not be exposed to external clients.
        It is protected by network-level isolation (e.g., Docker internal network).
      tags:
        - Persons
      requestBody:
        description: Person creation request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreateRequest'
            examples:
              ValidPersonCreation:
                summary: Example of a valid person creation
                value:
                  email: "john.doe@example.com"
                  firstName: "John"
                  lastName: "Doe"
                  passportNumber: "AB1234567"
                  phoneNumber: "+375291234567"
                  address:
                    countryAlpha2: "BY"
                    addressLine: "Nezavisimosti Ave, 100"
                    zipCode: "220030"
                    city: "Minsk"
                    state: "Minsk Region"
      responses:
        '201':
          description: Person created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonResponse'
              examples:
                SuccessfulCreation:
                  summary: Full person profile returned
                  value:
                    id: "a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8"
                    email: "john.doe@example.com"
                    firstName: "John"
                    lastName: "Doe"
                    passportNumber: "AB1234567"
                    phoneNumber: "+375291234567"
                    createdAt: "2026-03-26T10:00:00Z"
                    updatedAt: "2026-03-26T10:00:00Z"
                    address:
                      id: "b2c3d4e5-f6g7-8901-h2i3-j4k5l6m7n8o9"
                      country:
                        id: 123
                        name: "Belarus"
                        alpha2: "BY"
                        alpha3: "BLR"
                      addressLine: "Nezavisimosti Ave, 100"
                      zipCode: "220030"
                      city: "Minsk"
                      state: "Minsk Region"
                      archivedAt: "1970-01-01T00:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Conflict. Person with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                EmailConflict:
                  summary: Duplicate email
                  value:
                    error: "User with email 'john.doe@example.com' already exists"
                    status: 409

  /persons/{id}:
    get:
      operationId: getPersonById
      summary: Get person by ID
      description: |
        Retrieves a person by their UUID, including full address and country details.

        **Error scenarios:**
        - `404 Not Found`: No person exists with the given ID
      tags:
        - Persons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: "a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8"
      responses:
        '200':
          description: Person found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      operationId: updatePerson
      summary: Update person
      description: |
        Updates an existing person's data (first name, last name, contact info, address).

        **Validation rules:**
        - Only non-null fields are updated (partial updates supported)
        - Address fields can be updated independently
        - Country must still exist in reference table

        **Audit note:**
        All changes are automatically tracked by Hibernate Envers. Historical versions can be retrieved via separate audit endpoints (not part of this spec).

        **Error scenarios:**
        - `400 Bad Request`: Invalid field values
        - `404 Not Found`: Person does not exist
      tags:
        - Persons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Person update request (partial update supported)
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonUpdateRequest'
            examples:
              UpdateExample:
                summary: Update phone and address
                value:
                  phoneNumber: "+375297654321"
                  address:
                    zipCode: "220050"
                    city: "Minsk"
      responses:
        '200':
          description: Person updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deletePerson
      summary: Delete person
      description: |
        Soft-deletes a person by marking related records as archived.
        Actual database rows are not removed (to preserve audit history).

        **Note:** This operation is irreversible from the API perspective.

        **Error scenarios:**
        - `404 Not Found`: Person does not exist
      tags:
        - Persons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Person deleted (archived)
        '404':
          $ref: '#/components/responses/NotFound'

  /persons/email/{email}:
    get:
      operationId: getPersonByEmail
      summary: Get person by email
      description: |
        Retrieves a person by their email address.

        **Use case:** Used by `individuals-api` during registration to check for duplicates.

        **Error scenarios:**
        - `404 Not Found`: No person with this email
      tags:
        - Persons
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
          example: "john.doe@example.com"
      responses:
        '200':
          description: Person found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    PersonCreateRequest:
      type: object
      required: [email, firstName, lastName, passportNumber, phoneNumber, address]
      properties:
        email:
          type: string
          format: email
          description: Unique email address
        firstName:
          type: string
          minLength: 1
          description: First name of the person
        lastName:
          type: string
          minLength: 1
          description: Last name of the person
        passportNumber:
          type: string
          description: Optional passport number
        phoneNumber:
          type: string
          description: Optional phone number in international format
        address:
          $ref: '#/components/schemas/AddressCreateRequest'

    PersonUpdateRequest:
      type: object
      required: [firstName, lastName, passportNumber, phoneNumber, address]
      properties:
        firstName:
          type: string
          description: Updated first name
        lastName:
          type: string
          description: Updated last name
        passportNumber:
          type: string
          description: Updated passport number
        phoneNumber:
          type: string
          description: Updated phone number
        address:
          $ref: '#/components/schemas/AddressUpdateRequest'

    AddressCreateRequest:
      type: object
      required: [countryAlpha2, addressLine, zipCode, city]
      properties:
        countryAlpha2:
          type: string
          pattern: "^[A-Z]{2}$"
          example: "BY"
          description: ISO 3166-1 alpha-2 country code
        addressLine:
          type: string
          minLength: 1
          description: Street address
        zipCode:
          type: string
          minLength: 1
          description: Postal code
        city:
          type: string
          minLength: 1
          description: City name
        state:
          type: string
          description: State or region (optional)

    AddressUpdateRequest:
      type: object
      required: [addressLine, zipCode, city, state]
      properties:
        addressLine:
          type: string
          description: Updated street address
        zipCode:
          type: string
          description: Updated postal code
        city:
          type: string
          description: Updated city
        state:
          type: string
          description: Updated state or region

    PersonResponse:
      type: object
      required: [id, email, firstName, lastName, passportNumber, phoneNumber, createdAt, updatedAt, address]
      properties:
        id:
          type: string
          format: uuid
          description: Unique person identifier (UUID)
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        passportNumber:
          type: string
        phoneNumber:
          type: string
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp (ISO 8601)
        address:
          $ref: '#/components/schemas/AddressResponse'

    AddressResponse:
      type: object
      required: [id, country, addressLine, zipCode, city, state, archivedAt]
      properties:
        id:
          type: string
          format: uuid
        country:
          $ref: '#/components/schemas/CountryResponse'
        addressLine:
          type: string
        zipCode:
          type: string
        city:
          type: string
        state:
          type: string
        archivedAt:
          type: string
          format: date-time
          description: Timestamp when address was archived (epoch if active)

    CountryResponse:
      type: object
      required: [id, name, alpha2, alpha3]
      properties:
        id:
          type: integer
          description: Internal country ID
        name:
          type: string
          description: Full country name
        alpha2:
          type: string
          description: ISO 3166-1 alpha-2 code
        alpha3:
          type: string
          description: ISO 3166-1 alpha-3 code

    ErrorResponse:
      type: object
      required: [error, status]
      properties:
        error:
          type: string
          description: Human-readable error message
        status:
          type: integer
          description: HTTP status code

  responses:
    BadRequest:
      description: Bad Request (validation failed)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            InvalidEmail:
              summary: Malformed email
              value:
                error: "Email must be a valid email address"
                status: 400
            MissingField:
              summary: Required field missing
              value:
                error: "firstName field is required"
                status: 400

    NotFound:
      description: Person not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            PersonNotFound:
              summary: No person with given ID/email
              value:
                error: "Person not found"
                status: 404